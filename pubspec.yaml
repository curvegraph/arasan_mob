name: arasan_user
description: "Arasan Mobiles - Customer Shopping App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.8.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  carousel_slider: ^5.0.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  app_links: ^6.4.1
  play_install_referrer: ^0.5.0
  connectivity_plus: ^6.1.0
  smooth_page_indicator: ^1.2.0+3
  supabase_flutter: ^2.8.4
  shared_preferences: ^2.3.3
  flutter_dotenv: ^5.2.1
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.7
  http: ^1.6.0
  razorpay_flutter: ^1.3.7
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.5.2
  flutter_sticky_header: ^0.8.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  # Runtime API (FlutterNativeSplash.preserve/remove) is used in main.dart to
  # hold the native splash until the app is ready, so it must be a regular
  # dependency (not dev-only).
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_round.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo_round.png"

# Branded native launch/splash: the Arasan peacock on the logo's navy-blue
# background, shown on every device (dark mode + the Android 12+ splash API)
# so cold start no longer flashes a blank/black screen. The Flutter-side
# _BootScreen renders the same logo + "Arasan Mobiles" on the same navy so the
# hand-off is seamless. Regenerate after edits with:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#1F5593"
  image: assets/logo_round.png
  android: true
  ios: true
  android_12:
    color: "#1F5593"
    image: assets/logo_round.png

flutter:
  uses-material-design: true
  assets:
    - .env.demo
    - .env.live
    - assets/banners/
    - assets/logo.png
    - assets/logo_round.png
