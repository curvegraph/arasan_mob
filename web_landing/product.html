<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Arasan Mobiles…</title>
  <meta property="og:title" content="Arasan Mobiles" />
  <meta property="og:description" content="Open this product in the Arasan Mobiles app" />
  <meta property="og:image" content="https://arasanmobiles.in/logo.png" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff; color: #1a1a1a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px; min-height: 100vh;
    }
    img.logo { width: 84px; height: 84px; border-radius: 18px; margin-bottom: 20px; }
    h1 { font-size: 18px; margin: 0 0 6px; }
    p { color: #6b7280; font-size: 14px; margin: 0 0 26px; }
    .spinner {
      width: 26px; height: 26px; border: 3px solid #eee; border-top-color: #d32f2f;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 0 26px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: block; width: 100%; max-width: 320px; padding: 14px 16px;
      border-radius: 12px; font-size: 15px; font-weight: 600; text-decoration: none;
      margin-bottom: 12px; border: 1px solid transparent; cursor: pointer;
    }
    .btn-primary { background: #d32f2f; color: #fff; }
    .btn-secondary { background: #fff; color: #1a1a1a; border-color: #e0e0e0; }
    .hint { font-size: 12px; color: #9ca3af; margin-top: 10px; max-width: 320px; }
  </style>
</head>
<body>
  <img class="logo" src="https://arasanmobiles.in/logo.png" alt="Arasan Mobiles" onerror="this.style.display='none'" />
  <div class="spinner" id="spinner"></div>
  <h1>Opening in the Arasan Mobiles app…</h1>
  <p>If the app doesn't open, choose an option below.</p>

  <a href="#" id="openApp" class="btn btn-primary">📱 Open in App</a>
  <a href="#" id="getApp" class="btn btn-secondary">⬇️ Install the App</a>
  <div class="hint" id="waHint" style="display:none">
    Tip: if you opened this from WhatsApp and nothing happens, tap the ⋮ menu and choose
    “Open in browser”, then press <b>Open in App</b>.
  </div>

  <script>
    // ====================================================================
    // CONFIG
    // ====================================================================
    var CONFIG = {
      // Custom URL scheme the native app registers (must match the Flutter app).
      APP_SCHEME: 'com.arasanmobiles.user',

      // App store links (app NOT installed → send here to install).
      // Android package id = com.arasanmobiles.arasan_user.
      // NOTE: the app is not published yet — these will work once it's live.
      PLAY_STORE_URL: 'https://play.google.com/store/apps/details?id=com.arasanmobiles.arasan_user',
      APP_STORE_URL: '' // TODO: set the iOS App Store URL after publishing.
    };

    // ====================================================================
    // Parse product id + variant from /product/<slug>/p/<id>?variant=<v>
    // ====================================================================
    function parseTarget() {
      var segs = window.location.pathname.replace(/\/+$/, '').split('/').filter(Boolean);
      var id = '';
      var pIdx = segs.lastIndexOf('p');
      if (pIdx !== -1 && pIdx + 1 < segs.length) id = segs[pIdx + 1];
      else if (segs.length) id = segs[segs.length - 1];
      var params = new URLSearchParams(window.location.search);
      if (params.get('id')) id = params.get('id');
      return { id: id, variant: params.get('variant') || '' };
    }

    var T = parseTarget();
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    var isAndroid = /Android/.test(navigator.userAgent);
    var inWhatsApp = /WhatsApp/i.test(navigator.userAgent);

    function appDeepLink() {
      var q = T.variant ? ('?variant=' + encodeURIComponent(T.variant)) : '';
      return CONFIG.APP_SCHEME + '://product/' + encodeURIComponent(T.id) + q;
    }
    function storeUrl() {
      if (isIOS) return CONFIG.APP_STORE_URL || '';
      var base = CONFIG.PLAY_STORE_URL || '';
      if (!base) return '';
      // Deferred deep linking (Android): carry the product context THROUGH the
      // Play Store install via the `referrer` param. Google delivers it back to
      // the app on first launch (Install Referrer API), where
      // DeferredDeepLinkHandler reads "product=<id>&variant=<v>" and opens the
      // exact shared product — no re-search after install.
      if (T.id) {
        var ref = 'product=' + encodeURIComponent(T.id);
        if (T.variant) ref += '&variant=' + encodeURIComponent(T.variant);
        var sep = base.indexOf('?') === -1 ? '?' : '&';
        base += sep + 'referrer=' + encodeURIComponent(ref);
      }
      return base;
    }

    // Try to open the app; if we're still here after a moment, the app isn't
    // installed → send to the store.
    var redirected = false;
    function tryOpenApp(goStoreIfFail) {
      var start = Date.now();
      window.location.href = appDeepLink();
      if (goStoreIfFail) {
        setTimeout(function () {
          // If the app opened, the page is hidden/backgrounded — don't redirect.
          if (document.hidden || redirected) return;
          if (Date.now() - start < 2500) {
            var s = storeUrl();
            if (s) { redirected = true; window.location.href = s; }
          }
        }, 1500);
      }
    }

    // Wire buttons
    document.getElementById('openApp').addEventListener('click', function (e) {
      e.preventDefault(); tryOpenApp(false);
    });
    document.getElementById('getApp').addEventListener('click', function (e) {
      e.preventDefault(); var s = storeUrl(); if (s) window.location.href = s;
    });
    document.getElementById('openApp').setAttribute('href', appDeepLink());
    document.getElementById('getApp').setAttribute('href', storeUrl() || '#');

    // WhatsApp's in-app browser often blocks the app launch — show the tip there.
    if (inWhatsApp) {
      document.getElementById('waHint').style.display = 'block';
      document.getElementById('spinner').style.display = 'none';
    } else if (T.id) {
      // Auto-attempt the app, fall back to the store.
      tryOpenApp(true);
    }

    // Stop the spinner once the user leaves (app/store opened).
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) { redirected = true; document.getElementById('spinner').style.display = 'none'; }
    });
  </script>
</body>
</html>
